---
name: easyRasch2jmv
title: easyRasch2 for Jamovi
version: 0.2.5
jms: '1.0'
authors:
  - Magnus Johansson
maintainer: Magnus Johansson <pgmj@pm.me>
date: '2026-04-20'
type: R
description: >
  Provides Rasch analysis functions for Jamovi, wrapping analysis logic from the
  easyRasch2 R package. Includes conditional item infit, item-restscore, and
  partial gamma DIF from the iarm package, Yen's Q3 residuals from package mirt,
  and item probability curves (PCM) from eRm. Uses CML estimation from eRm,
  except for the analysis of Q3 residuals, which use MML estimation.
analyses:
  - title: Item-Restscore Correlations
    name: itemrestscore
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Item-Restscore Correlations
    category: analyses
    description: |
      Computes observed and model-expected item-restscore correlations using
      Goodman-Kruskal's gamma (via the iarm package). Fits a Rasch model
      (dichotomous data) or Partial Credit Model (polytomous data) using eRm,
      then reports observed vs. expected restscore correlations, absolute
      differences, adjusted p-values, and item locations.
  - title: Q3 Residual Correlation Matrix
    name: locdepq3
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Q3 Residual Correlation Matrix
    category: analyses
    description: |
      Computes Yen's Q3 residual correlations between item pairs for local
      dependence assessment in Rasch models (fitted via mirt). Optionally
      runs a parametric bootstrap simulation to determine a simulation-based
      cutoff value. Single-core sequential processing is used by default.
  - title: Conditional Item Infit
    name: iteminfit
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Conditional Item Infit
    category: analyses
    description: |
      Computes conditional infit MSQ statistics for each item using
      iarm::out_infit(). Optionally determines simulation-based cutoff
      values via parametric bootstrap and visualises the results.
  - title: Partial Gamma DIF
    name: partgamdif
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Partial Gamma DIF
    category: analyses
    description: |
      Computes partial gamma coefficients for Differential Item Functioning
      (DIF) using iarm::partgam_DIF(). Optionally determines simulation-based
      cutoff values via parametric bootstrap and visualises the results.
  - title: Item Probability Curves
    name: iccplot
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Item Probability Curves
    category: analyses
    description: |
      Fits a Rasch model using eRm (CML) and displays item characteristic
      curve (ICC) trace plots showing the probability of each response
      category as a function of the latent trait (theta).
  - title: Targeting Plot
    name: targeting
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Targeting Plot
    category: analyses
    description: |
      Person-item targeting plot (Wright Map) showing back-to-back histograms
      of person and item threshold locations, plus a dot plot of individual
      item thresholds. Uses CML estimation via eRm.
  - title: Bootstrap Item-Restscore
    name: bootrestscore
    ns: easyRasch2jmv
    menuGroup: easyRasch2jmv
    menuTitle: Bootstrap Item-Restscore
    category: analyses
    description: >
      Non-parametric bootstrap of item-restscore fit using
      iarm::item_restscore().

      For each iteration a sample of size `samplesize` is drawn from the data

      with replacement, the appropriate Rasch model (eRm::RM for dichotomous,

      psychotools::pcmodel for polytomous) is refitted, and items are classified

      as overfit, underfit, or no misfit based on the BH-adjusted p-value

      (< .05) and the sign of (expected - observed). Useful with large samples

      where the asymptotic test can flag items that are not practically

      misfitting.
datasets:
  - name: pcmdat2
    path: eRm_pcmdat2.csv
    description: Polytomous dataset from eRm
  - name: raschdat3
    path: eRm_raschdat3.csv
    description: Dichotomous dataset from eRm
  - name: pcmdat2dif
    path: eRm_pcmdat2dif.csv
    description: Polytomous dataset from eRm with added DIF variable
usesNative: false
minApp: 1.0.8

...
