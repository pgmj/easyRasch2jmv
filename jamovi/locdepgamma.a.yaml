---
name: locdepgamma
title: Partial Gamma Local Dependence
menuGroup: easyRasch2jmv
version: '1.0.0'
jas: '1.2'

description:
    main: |
        Computes partial gamma coefficients for Local Dependence (LD)
        assessment using iarm::partgam_LD(). Each pair of items is tested
        for residual association, controlling for the rest score (total
        score minus one of the items in the pair). Because it matters
        which item of a pair is subtracted from the total score, each pair
        is tested in both rest-score directions (two tables). Based on
        easyRasch2::RMlocdepGamma().

options:
    - name: data
      type: Data

    - name: vars
      title: Items
      type: Variables
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      rejectInf: true

    - name: nPairs
      title: Number of pairs to display (0 = all)
      type: Integer
      default: 0
      min: 0

    - name: sigOnly
      title: Significant pairs only (adj. p < .05)
      type: Bool
      default: false

    - name: gammaThreshold
      title: Minimum |gamma| to display (0 = off)
      type: Number
      default: 0
      min: 0
      max: 1

    - name: sortByGamma
      title: Sorted by |Partial gamma| (descending)
      type: Bool
      default: false

    - name: showSE
      title: SE and 95% confidence interval
      type: Bool
      default: false
...
