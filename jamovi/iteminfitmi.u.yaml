title: Conditional Item Infit (Multiple Imputation)
name: iteminfitmi
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Auxiliary variables (optional)
        children:
          - type: VariablesListBox
            name: auxVars
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: method
      - type: TextBox
        name: m
        format: number
      - type: TextBox
        name: maxit
        format: number
      - type: TextBox
        name: seed
        format: number

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: sortByInfit

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: hdciWidth
                format: number
                suffix: "%"
              - type: TextBox
                name: iterations
                format: number
