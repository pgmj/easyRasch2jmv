---
name: partgamdif
title: Partial Gamma DIF
jrs: '1.1'

items:
    - name: pgdifTable
      title: Partial Gamma DIF
      type: Table
      rows: (vars)
      refs: [easyRasch2jmv, bjorner1998, henninger2024, mueller2022, zeileis2026, kay2025]
      clearWith:
        - vars
        - difVar
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
        - sortByGamma
      columns:
        - name: item
          title: Item
          type: text
        - name: gamma
          title: Observed gamma
          type: number
          format: zto
        - name: se
          title: SE
          type: number
          format: zto
          visible: (showSE)
        - name: lower
          title: Lower
          type: number
          format: zto
          visible: (showSE)
          superTitle: 95% CI
        - name: upper
          title: Upper
          type: number
          format: zto
          visible: (showSE)
          superTitle: 95% CI
        - name: padjBH
          title: Adj. p-value (BH)
          type: number
          format: zto,pvalue
        - name: sig
          title: p-value sign.
          type: text
        - name: gammaLow
          title: Lower
          type: number
          format: zto
          visible: (computeCutoff)
          superTitle: Expected range
        - name: gammaHigh
          title: Upper
          type: number
          format: zto
          visible: (computeCutoff)
          superTitle: Expected range
        - name: flagged
          title: Flagged
          type: text
          visible: (computeCutoff)

    - name: cutoffNote
      title: ''
      type: Html
      clearWith:
        - vars
        - difVar
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
        - showSE

    - name: pgdifPlot
      title: Simulated Partial Gamma Distribution
      type: Image
      width: 400
      height: 500
      renderFun: .pgDIFplot
      visible: (computeCutoff)
      requiresData: true
      clearWith:
        - vars
        - difVar
        - computeCutoff
        - hdciWidth
        - iterations
        - seed

    - name: tileplot
      title: Response Distribution by DIF Group
      type: Image
      width: 600
      height: 600
      renderFun: .tileplot
      visible: (showTileplot)
      requiresData: true
      clearWith:
        - vars
        - difVar
        - showTileplot
        - tileCutoff
        - tilePercent
...
