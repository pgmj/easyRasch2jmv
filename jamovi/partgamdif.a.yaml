---
name: partgamdif
title: Partial Gamma DIF
menuGroup: easyRasch2jmv
version: '1.0.0'
jas: '1.2'

description:
    main: |
        Computes partial gamma coefficients for Differential Item
        Functioning (DIF) using iarm::partgam_DIF(): the association
        between each item and the DIF variable, controlling for the rest
        score. Optionally determines simulation-based expected ranges via
        parametric bootstrap (the DIF variable is randomly reassigned with
        preserved group proportions, so the simulated data contain no true
        DIF). A response-distribution tileplot is available for inspecting
        per-group category counts.

        More simulation iterations are generally recommended for
        publication-ready results.

options:
    - name: data
      type: Data

    - name: vars
      title: Items
      type: Variables
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      rejectInf: true

    - name: difVar
      title: DIF Variable
      type: Variable
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor

    - name: computeCutoff
      title: Simulation-based cutoffs
      type: Bool
      default: false

    - name: hdciWidth
      title: HDCI width
      type: Number
      default: 99
      min: 50
      max: 100

    - name: iterations
      title: Number of simulation iterations
      type: Integer
      default: 250
      min: 50

    - name: seed
      title: Random seed
      type: Integer
      default: 42

    - name: sortByGamma
      title: Sorted by |Partial gamma| (descending)
      type: Bool
      default: false

    - name: showSE
      title: SE and 95% confidence interval
      type: Bool
      default: false

    - name: showTileplot
      title: Response distribution by DIF group
      type: Bool
      default: false

    - name: tileCutoff
      title: Highlight cells with count below
      type: Integer
      default: 10
      min: 1

    - name: tilePercent
      title: Percentages (instead of counts)
      type: Bool
      default: false
...
