---
name: locdepq3
title: Q3 Residual Correlation Matrix
jrs: '1.1'

items:
    - name: q3Table
      title: Q3 Residual Correlation Matrix
      type: Table
      refs: [easyRasch2jmv, yen1984, christensen2017, chalmers2012, zeileis2026]
      clearWith:
          - vars
          - computeCutoff
          - iterations
          - seed
      columns: []

    - name: cutoffTable
      title: Simulation-Based Global Q3 Cutoff
      type: Table
      visible: (computeCutoff)
      clearWith:
          - vars
          - computeCutoff
          - iterations
          - seed
      columns:
          - name: parameter
            title: Parameter
            type: text
          - name: value
            title: Value
            type: number
            format: zto

    - name: q3Plot
      title: Simulated Q3 Distribution per Item Pair
      type: Image
      width: 500
      height: 600
      renderFun: .q3Plot
      visible: (computeCutoff)
      requiresData: true
      clearWith:
          - vars
          - computeCutoff
          - iterations
          - seed
          - nPairs

    - name: pairTable
      title: Q3 by Item Pair
      type: Table
      rows: 0
      visible: (computeCutoff)
      clearWith:
          - vars
          - computeCutoff
          - iterations
          - hdciWidth
          - seed
      columns:
          - name: item1
            title: Item 1
            type: text
          - name: item2
            title: Item 2
            type: text
          - name: q3
            title: Observed Q3
            type: number
            format: zto
          - name: q3Low
            title: Lower
            type: number
            format: zto
            superTitle: Expected range
          - name: q3High
            title: Upper
            type: number
            format: zto
            superTitle: Expected range
          - name: flagged
            title: Flagged
            type: text

    - name: q3Note
      title: ''
      type: Html
      clearWith:
          - vars
          - computeCutoff
          - iterations
          - hdciWidth
          - seed
...
