---
title: Andersen LR-test DIF
name: lrdif
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

      - type: TargetLayoutBox
        label: DIF Variable
        children:
          - type: VariablesListBox
            name: difVar
            isTarget: true
            maxItemCount: 1

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: level
      - type: TextBox
        name: cutoff
        format: number
      - type: CheckBox
        name: sortByMaxDiff

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showFigure
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: confLevel
                format: number
                suffix: "%"

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showTileplot
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: tileCutoff
                format: number
              - type: CheckBox
                name: tilePercent
...
