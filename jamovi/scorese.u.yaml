title: Sum Score to Logit Transformation
name: scorese
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: method
      - type: TextBox
        name: thetaMin
        format: number
      - type: TextBox
        name: thetaMax
        format: number

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showFigure
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: ciMultiplier
                format: number
