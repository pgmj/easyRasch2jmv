---
title: Partial Gamma DIF
name: partgamdif
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

      - type: TargetLayoutBox
        label: DIF Variable
        children:
          - type: VariablesListBox
            name: difVar
            isTarget: true
            maxItemCount: 1

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: sortByGamma

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: hdciWidth
                format: number
                suffix: "%"
              - type: TextBox
                name: iterations
                format: number
              - type: TextBox
                name: seed
                format: number
...
