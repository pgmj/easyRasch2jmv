title: Q3 Residual Correlation Matrix
name: locdepq3
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: iterations
        format: number
        enable: (computeCutoff)
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: seed
        format: number
        enable: (computeCutoff)
