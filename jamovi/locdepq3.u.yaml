title: Q3 Residual Correlation Matrix
name: locdepq3
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: iterations
                format: number
              - type: TextBox
                name: hdciWidth
                format: number
                suffix: "%"
              - type: TextBox
                name: seed
                format: number
              - type: TextBox
                name: nPairs
                format: number
