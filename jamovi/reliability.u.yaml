title: Reliability
name: reliability
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: estim
      - type: TextBox
        name: confInt
        format: number
        suffix: "%"
      - type: TextBox
        name: draws
        format: number
      - type: TextBox
        name: rmuIter
        format: number

  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: thetaMin
        format: number
      - type: TextBox
        name: thetaMax
        format: number
      - type: TextBox
        name: seed
        format: number

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: bootAlpha
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: bootIter
                format: number
