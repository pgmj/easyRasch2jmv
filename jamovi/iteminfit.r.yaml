---
name: iteminfit
title: Conditional Item Infit
jrs: '1.1'

items:
    - name: infitTable
      title: Conditional Item Infit MSQ
      type: Table
      rows: (vars)
      refs: [easyRasch2jmv, mueller2020, johansson2025_detecting, mair2007, zeileis2026, kay2025]
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
        - sortByInfit
      columns:
        - name: item
          title: Item
          type: text
        - name: infitMSQ
          title: Observed infit
          type: number
          format: zto
        - name: infitLow
          title: Lower
          type: number
          format: zto
          visible: (computeCutoff)
          superTitle: Expected range
        - name: infitHigh
          title: Upper
          type: number
          format: zto
          visible: (computeCutoff)
          superTitle: Expected range
        - name: misfit
          title: Flagged
          type: text
          visible: (computeCutoff)
        - name: relLocation
          title: Rel. location
          type: number
          format: zto

    - name: cutoffNote
      title: ''
      type: Html
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed

    - name: infitPlot
      title: Simulated Infit MSQ Distribution
      type: Image
      width: 500
      height: 600
      renderFun: .infitPlot
      visible: (computeCutoff)
      requiresData: true
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
...
