---
name: iteminfit
title: Conditional Item Infit
jrs: '1.1'

items:
    - name: infitTable
      title: Conditional Item Infit MSQ
      type: Table
      rows: (vars)
      refs: [easyRasch2jmv, mueller2020, johansson2025_detecting, mair2007, zeileis2026, kay2025]
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
      columns:
        - name: item
          title: Item
          type: text
        - name: infitMSQ
          title: Infit MSQ
          type: number
        - name: infitLow
          title: Lower
          type: number
          format: zto
          visible: (computeCutoff)
          superTitle: Expected range
        - name: infitHigh
          title: Upper
          type: number
          visible: (computeCutoff)
          superTitle: Expected range
        - name: flagged
          title: Flagged
          type: text
          visible: (computeCutoff)
        - name: relLocation
          title: Relative location
          type: number

    - name: cutoffNote
      title: ''
      type: Html
      visible: (computeCutoff)
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed

    - name: infitPlot
      title: Simulated Infit MSQ Distribution
      type: Image
      width: 400
      height: 500
      renderFun: .infitPlot
      visible: (computeCutoff)
      requiresData: true
      clearWith:
        - vars
        - computeCutoff
        - hdciWidth
        - iterations
        - seed
...
