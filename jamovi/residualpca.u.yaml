title: PCA of Standardized Rasch Residuals
name: residualpca
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: nComponents
        format: number
      - type: CheckBox
        name: coordFlip

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: iterations
                format: number
              - type: TextBox
                name: seed
                format: number
