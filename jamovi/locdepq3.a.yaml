---
name: locdepq3
title: Q3 Residual Correlation Matrix
menuGroup: easyRasch2jmv
version: '1.0.0'
jas: '1.2'

description:
    main: |
        Computes Yen's Q3 residual correlations between item pairs for local
        dependence assessment in Rasch models (fitted via mirt). Optionally
        runs a parametric bootstrap simulation to determine a simulation-based
        cutoff value. Single-core sequential processing is used by default.

options:
    - name: data
      type: Data

    - name: vars
      title: Items
      type: Variables
      suggested:
          - continuous
          - ordinal
      permitted:
          - numeric
      rejectInf: true

    - name: computeCutoff
      title: Compute simulation-based cutoff (takes some time)
      type: Bool
      default: false

    - name: iterations
      title: Number of simulation iterations
      type: Integer
      default: 100
      min: 50
      max: 5000

    - name: hdciWidth
      title: HDCI width for item-pair intervals
      type: Number
      default: 99
      min: 50
      max: 100

    - name: seed
      title: Random seed
      type: Integer
      default: 42
      min: 0

    - name: nPairs
      title: Max. number of item pairs to plot
      type: Integer
      default: 10
      min: 1
      max: 50

...
