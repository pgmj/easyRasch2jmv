---
title: Conditional Item Infit
name: iteminfit
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: sortByInfit

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: computeCutoff
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: cutoffMethod
              - type: TextBox
                name: hdciWidth
                format: number
                enable: (cutoffMethod:hdci)
              - type: TextBox
                name: iterations
                format: number
              - type: TextBox
                name: seed
                format: number
...
