---
name: targeting
title: Targeting Plot
menuGroup: easyRasch2jmv
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data

    - name: vars
      title: Items
      type: Variables
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      rejectInf: true

    - name: robust
      title: Use robust statistics (median/MAD instead of mean/SD)
      type: Bool
      default: false

    - name: sortItems
      title: Item ordering
      type: List
      options:
        - name: data
          title: Data order
        - name: location
          title: Sort by location
      default: data

    - name: bins
      title: Number of histogram bins
      type: Integer
      default: 15
      min: 5

    - name: xlimLow
      title: X-axis lower limit
      type: Number
      default: -4
      min: -10
      max: 0

    - name: xlimHigh
      title: X-axis upper limit
      type: Number
      default: 4
      min: 0
      max: 10
...
