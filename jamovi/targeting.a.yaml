---
name: targeting
title: Targeting Plot
menuGroup: easyRasch2jmv
version: '1.0.0'
jas: '1.2'

description:
    main: |
        Person-item targeting plot (Wright map): back-to-back histograms
        of person locations and item threshold locations, plus a dot plot
        of individual item thresholds with optional confidence intervals.
        Item thresholds are estimated with CML (eRm); when any response
        category has fewer than 3 observations the analysis falls back to
        MML (mirt), which is more numerically stable under sparse
        categories. Person locations always come from the eRm model.
        Mirrors easyRasch2::RMtargeting().

options:
    - name: data
      type: Data

    - name: vars
      title: Items
      type: Variables
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
      rejectInf: true

    - name: robust
      title: Use robust statistics (median/MAD instead of mean/SD)
      type: Bool
      default: false

    - name: sortItems
      title: Item ordering
      type: List
      options:
        - name: data
          title: Data order
        - name: location
          title: Sort by location
      default: data

    - name: bins
      title: Number of histogram bins
      type: Integer
      default: 15
      min: 5

    - name: xlimLow
      title: X-axis lower limit
      type: Number
      default: -4
      min: -10
      max: 0

    - name: xlimHigh
      title: X-axis upper limit
      type: Number
      default: 4
      min: 0
      max: 10

    - name: showCi
      title: Show CIs around item threshold locations
      type: Bool
      default: true

    - name: ciLevel
      title: Confidence level (%)
      type: Number
      default: 95
      min: 50
      max: 99.9
...
